name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --fix
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: condodata_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: condodata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - env:
          DATABASE_URL: postgresql://condodata_test:test_password@localhost:5432/condodata_test
          SECRET_KEY: test_secret_key_that_is_long_enough_32chars
          ENVIRONMENT: test
        run: pytest tests/ -v --cov=ingestion --cov=api --cov-report=xml
